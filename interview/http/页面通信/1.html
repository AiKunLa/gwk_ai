<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>页面 A - postMessage 发送方</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        h1 { color: #333; }
        .send-box { margin: 20px 0; }
        input { padding: 8px; width: 70%; }
        button { padding: 8px 16px; cursor: pointer; }
        .log { background: #f5f5f5; padding: 10px; max-height: 300px; overflow-y: auto; }
        .log p { margin: 5px 0; border-bottom: 1px solid #eee; }
        .log .sent { color: blue; }
        .log .received { color: green; }
        iframe { width: 100%; height: 200px; border: 1px solid #ccc; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>页面 A - 发送消息</h1>
        <p>在下方输入消息，点击发送，iframe 中的页面会收到消息</p>

        <div class="send-box">
            <input type="text" id="messageInput" placeholder="输入要发送的消息...">
            <button onclick="sendMessage()">发送</button>
            <button onclick="sendObject()">发送对象</button>
        </div>

        <h3>通信日志：</h3>
        <div class="log" id="log"></div>

        <h3>嵌入的子页面（页面 B）：</h3>
        <iframe src="2.html" id="childFrame"></iframe>
    </div>

    <script>
        // 获取 iframe 窗口
        const childFrame = document.getElementById('childFrame')
        const log = document.getElementById('log')

        // 等待 iframe 加载完成后获取其 window 对象
        childFrame.onload = function() {
            logMessage('system', '子页面已加载')
        }

        // 发送消息函数
        function sendMessage() {
            const input = document.getElementById('messageInput')
            const message = input.value

            if (!message) {
                alert('请输入消息')
                return
            }

            // 方式 1: 通过 iframe 发送（同源）
            const childWindow = childFrame.contentWindow
            childWindow.postMessage(message, '*')

            logMessage('sent', `发送: ${message}`)
            input.value = ''
        }

        // 发送对象
        function sendObject() {
            const data = {
                type: 'greet',
                name: '页面A',
                timestamp: Date.now(),
                data: { msg: '你好！' }
            }

            const childWindow = childFrame.contentWindow
            childWindow.postMessage(data, '*')

            logMessage('sent', `发送对象: ${JSON.stringify(data)}`)
        }

        // 监听来自子页面的消息
        window.addEventListener('message', function(event) {
            // 注意：实际项目中应该验证 event.origin
            const data = event.data
            logMessage('received', `收到: ${JSON.stringify(data)}`)
        })

        // 辅助函数：添加日志
        function logMessage(type, text) {
            const p = document.createElement('p')
            p.className = type
            p.textContent = `[${new Date().toLocaleTimeString()}] ${text}`
            log.appendChild(p)
            log.scrollTop = log.scrollHeight
        }

        // 监听窗口消息（方式2：通用方式）
        window.addEventListener('message', function(event) {
            // 验证来源
            // if (event.origin !== 'http://localhost:3000') return

            console.log('收到消息:', event.data)
            console.log('来源:', event.origin)
        })
    </script>
</body>
</html>
