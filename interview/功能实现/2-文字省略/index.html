<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container {
            display: flex;
            gap: 20px;
            height: 100%;
        }

        .item {
            flex: 1;
            width: 100px;
            height: 100px;
            background-color: pink;
        }

        .text-ellipsis {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* 两行截断 */
        .text-clamp {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            overflow-wrap: break-word;
        }

        /* 强制长单词换行 */
        .break-word {
            overflow-wrap: break-word;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }

        .grid-item {
            background-color: blanchedalmond;
            text-align: center;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="item">
            <p class="text-ellipsis">
                文字太长容不下（单行省略、多行截断、防止撑破）
            </p>
        </div>
        <div class="item">
            <p class="text-clamp">
                文字太长容不下dangerousddddddddd
                文字太长容不下（单行省略、多行截断、防止撑破）
                文字太长容不下（单行省略、多行截断、防止撑破）

            </p>
        </div>
        <div class="item">
            <p class="break-word">
                He is a boy who name is dangerousddddddddd
            </p>
        </div>
    </div>

    <div class="grid-container">
        <div class="grid-item">1</div>
        <div class="grid-item">2</div>
        <div class="grid-item">3</div>
        <div class="grid-item">4</div>
        <div class="grid-item">5</div>
        <div class="grid-item">6</div>
        <div class="grid-item">7</div>
        <div class="grid-item">8</div>
        <div class="grid-item">9</div>
    </div>
</body>

</html>
